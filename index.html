<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestalt Laws - HCI Assignment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Progress Bar Header -->
        <header class="top-bar">
            <div class="progress-container">
                <div class="progress-info">
                    <span class="progress-label"><i class="fas fa-chart-line"></i> Learning Progress</span>
                    <span id="progress-percentage" class="progress-percentage">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-fill" class="progress-bar-fill" style="width: 0%;"></div>
                </div>
            </div>
        </header>

        <div class="main-layout">
            <!-- Sidebar Navigation -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <i class="fas fa-brain logo-icon"></i>
                    <h2 class="sidebar-title">Gestalt Laws</h2>
                </div>
                <nav id="law-menu">
                    <button class="menu-item" data-law="proximity">
                        <i class="fas fa-layer-group"></i> <span>Proximity</span>
                    </button>
                    <button class="menu-item" data-law="similarity">
                        <i class="fas fa-shapes"></i> <span>Similarity</span>
                    </button>
                    <button class="menu-item" data-law="closure">
                        <i class="fas fa-circle-notch"></i> <span>Closure</span>
                    </button>
                    <button class="menu-item" data-law="continuity">
                        <i class="fas fa-wave-square"></i> <span>Continuity</span>
                    </button>
                    <button class="menu-item" data-law="figure-ground">
                        <i class="fas fa-mountain"></i> <span>Figure-Ground</span>
                    </button>
                    <button class="menu-item" data-law="parallelism">
                        <i class="fas fa-grip-lines"></i> <span>Parallelism</span>
                    </button>
                </nav>
            </aside>

            <!-- Content Area -->
            <main class="content-area">
                <div id="welcome-message" class="welcome-message">
                    <div class="welcome-icon"><i class="fas fa-lightbulb"></i></div>
                    <h3>Explore the Laws of Visual Perception</h3>
                    <p>Select a Gestalt Law from the menu to discover how our brains organize visual information.</p>
                </div>
                <div id="definition-card" class="definition-card hidden">
                    <div class="card-content">
                        <div class="card-header-row">
                            <span class="category-tag">Gestalt Principle</span>
                            <div class="law-id-badge">#<span id="law-number">1</span></div>
                        </div>
                        <h1 id="law-title" class="law-title"></h1>
                        <p id="law-description" class="law-description"></p>
                        
                        <!-- Visual Example Area -->
                        <div class="visual-example-container">
                            <h4 class="example-label">Visual Example:</h4>
                            <div id="law-visual" class="law-visual-display">
                                <!-- Dynamic SVG/CSS illustration goes here -->
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
